<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Create Your Identity</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="username.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="bg-mesh">
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="particles"></div>
</div>
<div id="toastContainer" class="toast-container" aria-live="polite"></div>
<div id="loadingOverlay" class="loading-overlay hidden">
<div class="spinner"></div>
<p>Saving your profile...</p>
</div>
<main class="app-container">
<div class="glass-card slide-up-anim">
<header class="header">
<button class="icon-btn back-btn" aria-label="Go Back" id="backBtn">
<i class="ri-arrow-left-s-line"></i>
</button>
<div class="step-indicator">
<span class="step-text">Step 1 of 2</span>
<div class="progress-track">
<div class="progress-fill"></div>
</div>
</div>
</header>
<div class="avatar-section fade-in-anim delay-1">
<div class="avatar-wrapper">
<div class="avatar-ring"></div>
<div class="avatar-circle" id="avatarPreviewContainer">
<img id="avatarPreview" src="" alt="Avatar Preview" class="hidden">
<i class="ri-user-line" id="avatarPlaceholder"></i>
</div>
<button class="camera-btn" aria-label="Upload Photo" id="cameraBtn">
<i class="ri-camera-fill"></i>
</button>
<input type="file" id="avatarInput" accept="image/png, image/jpeg, image/jpg, image/webp" class="hidden">
</div>
</div>
<div class="title-section fade-in-anim delay-2">
<h1>Create Your <span class="text-gradient">Identity</span></h1>
<p>Set up your profile to start connecting</p>
</div>
<form class="profile-form fade-in-anim delay-3" id="profileForm">
<div class="input-group">
<label for="displayName"><i class="ri-user-line"></i> Display Name</label>
<div class="input-wrapper">
<input type="text" id="displayName" placeholder="Your Name" autocomplete="off" required minlength="2" maxlength="50">
<div class="border-glow"></div>
</div>
</div>
<div class="input-group">
<label for="username"><i class="ri-at-line"></i> Username</label>
<div class="input-wrapper username-wrapper">
<span class="prefix">@</span>
<input type="text" id="username" placeholder="username" autocomplete="off" required minlength="3" maxlength="20">
<i id="usernameStatusIcon" class="ri-loader-4-line success-icon hidden"></i>
<div class="border-glow"></div>
</div>
<span id="usernameHelper" class="helper-text text-muted">
<i class="ri-information-line"></i> Only lowercase letters, numbers, and underscores
</span>
</div>
<div class="input-group">
<label><i class="ri-user-smile-line"></i> Gender</label>
<div class="custom-dropdown" id="genderDropdown" tabindex="0">
<div class="dropdown-selected">
<span id="selectedGender">Select Gender</span>
<i class="ri-arrow-down-s-line dropdown-arrow"></i>
</div>
<div class="dropdown-options" role="listbox">
<div class="dropdown-option" role="option" data-value="Male">Male</div>
<div class="dropdown-option" role="option" data-value="Female">Female</div>
<div class="dropdown-option" role="option" data-value="Non-Binary">Non-Binary</div>
<div class="dropdown-option" role="option" data-value="Prefer not to say">Prefer not to say</div>
</div>
<div class="border-glow"></div>
</div>
</div>
<div class="input-group">
<label for="bio"><i class="ri-pencil-line"></i> Bio</label>
<div class="input-wrapper textarea-wrapper">
<textarea id="bio" placeholder="Write something about yourself..." maxlength="150" rows="3"></textarea>
<span class="char-counter"><span id="charCount">0</span>/150</span>
<div class="border-glow"></div>
</div>
</div>
<button type="submit" class="primary-btn fade-in-anim delay-4" id="submitBtn">
<i class="ri-sparkling-2-fill btn-icon-left"></i>
<span class="btn-text">Save & Continue</span>
<i class="ri-arrow-right-line btn-icon-right"></i>
</button>
</form>
<footer class="security-footer fade-in-anim delay-5">
<i class="ri-lock-password-line"></i>
<span>Your information is secure with us</span>
</footer>
</div>
</main>
<script src="username.js"></script>
</body>
</html>
