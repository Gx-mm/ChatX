<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatX - Safe & Secure</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">
    <div class="bubble"></div>
    <div class="bubble small"></div>
  </div>
  <h1>Chat<span>X</span></h1>
  <div class="safe">• 🔒 Safe &amp; Secure •</div>

  <div class="shield">
    <div class="lock">🔒</div>
  </div>

  <button class="google">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
    Continue with Google
  </button>

  <div class="or"><span>OR</span></div>

  <button class="email">✉ Continue with Email</button>

  <p class="footer">🛡 Your chats. Your privacy. Always protected.</p>
</div>
</body>
</html>
