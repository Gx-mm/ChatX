<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ChatX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{background:linear-gradient(180deg,#061225,#120a2e);color:#fff;padding:18px}
.header{display:flex;justify-content:space-between;align-items:center}
.logo h1{font-size:32px}.logo p{color:#7ec8ff}
.avatar{width:52px;height:52px;border-radius:50%;background:#4b6bff}
.search{margin:18px 0;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);padding:14px;border-radius:18px}
.search input{width:100%;background:none;border:none;color:#fff;font-size:16px;outline:none}
.chat{display:flex;gap:12px;align-items:center;background:rgba(255,255,255,.06);padding:14px;border-radius:20px;margin:12px 0;text-decoration:none;color:#fff}
.pic{width:58px;height:58px;border-radius:50%;background:linear-gradient(45deg,#00bfff,#8a2be2)}
.mid{flex:1}.user{font-weight:700}.at{font-size:13px;color:#9db7ff}.msg{color:#cbd5e1;font-size:14px}
.time{text-align:right}.badge{display:inline-block;margin-top:8px;background:#2196f3;border-radius:50%;padding:6px 10px}
.fab{position:fixed;right:20px;bottom:90px;width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:38px;background:linear-gradient(45deg,#2196f3,#7b2cff)}
.nav{position:fixed;left:10px;right:10px;bottom:10px;background:rgba(255,255,255,.08);display:flex;justify-content:space-around;padding:16px;border-radius:24px}
</style>
</head>
<body>
<div class="header">
<div class="logo"><h1>ChatX</h1><p>Safe & Secure</p></div>
<div class="avatar"></div>
</div>
<div class="search"><input placeholder="Search username..."></div>
<script>
const users=[
["Ava","@ava","Hey! How are you?","10:45","3"],
["Liam","@liam","That sounds great!","10:32","2"],
["Sophia","@sophia","Meeting rescheduled.","09:58","5"],
["Noah","@noah","Files sent.","09:41","1"],
["Isabella","@bella","Love the update!","09:21","4"],
["Ethan","@ethan","See you tomorrow.","08:59","2"],
["Mia","@mia","Thank you!","08:30","1"],
["Lucas","@lucas","Let's catch up.","08:15","0"]
];
document.write(users.map(u=>`
<a class="chat" href="chat.html?user=${u[0]}">
<div class="pic"></div>
<div class="mid"><div class="user">${u[0]}</div><div class="at">${u[1]}</div><div class="msg">${u[2]}</div></div>
<div class="time">${u[3]}<br>${u[4]!="0"?`<span class="badge">${u[4]}</span>`:""}</div>
</a>`).join(""));
</script>
<div class="fab">+</div>
<div class="nav"><div>Chats</div><div>Search</div><div>Profile</div><div>Settings</div></div>
</body></html>
